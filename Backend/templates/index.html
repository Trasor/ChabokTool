<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChabokTool - پلتفرم ابزارهای SEO</title>
    <style>
        @font-face {
            font-family: 'BYekan';
            src: url('/static/fonts/BYekan Regular.woff') format('woff');
            font-weight: normal;
        }
        @font-face {
            font-family: 'BYekan';
            src: url('/static/fonts/BYekan Bold.woff') format('woff');
            font-weight: bold;
        }
        body {
            font-family: 'BYekan', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
            font-weight: bold;
        }
        h3 {
            font-weight: bold;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-right: 5px solid #28a745;
        }
        .links {
            margin-top: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 25px;
            margin: 10px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
            font-weight: bold;
        }
        .btn:hover {
            background: #0056b3;
        }
        .api-test {
            margin-top: 30px;
            text-align: right;
        }
        .api-btn {
            background: #28a745;
            padding: 8px 15px;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-family: 'BYekan', Tahoma, sans-serif;
        }
        strong {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 پلتفرم ChabokTool</h1>
        
        <div class="success">
            <strong>موفقیت!</strong> پلتفرم با موفقیت راه‌اندازی شد و آماده استفاده است.
        </div>
        
        <p>پلتفرم ابزارهای SEO و افزونه‌های وردپرس شما آماده است!</p>
        
        <div class="links">
            <a href="/admin/" class="btn">پنل مدیریت</a>
            <a href="/api/modules/list/" class="btn">API ماژول‌ها</a>
        </div>
        
        <div class="api-test">
            <h3>تست API:</h3>
            <button class="api-btn" onclick="testModules()">تست لیست ماژول‌ها</button>
            <button class="api-btn" onclick="testAccounts()">تست اکانت</button>
            
            <div id="result" style="margin-top: 15px; padding: 10px; background: #f8f9fa; border-radius: 5px; display: none;"></div>
        </div>
    </div>
    
    <script>
        function testModules() {
            fetch('/api/modules/list/')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('result').innerHTML = '<strong>نتیجه تست ماژول‌ها:</strong><br>' + JSON.stringify(data, null, 2);
                });
        }
        
        function testAccounts() {
            fetch('/api/accounts/profile/')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('result').innerHTML = '<strong>نتیجه تست اکانت:</strong><br>' + JSON.stringify(data, null, 2);
                });
        }
    </script>
</body>
</html>
